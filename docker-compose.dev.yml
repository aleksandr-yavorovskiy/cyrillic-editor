services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./frontend/public/fonts:/fonts
    environment:
      FONT_DIR: /fonts
    env_file:
      - ./backend/.env

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    env_file:
      - ./frontend/.env
    depends_on:
      - backend