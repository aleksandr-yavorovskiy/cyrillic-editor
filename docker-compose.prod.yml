services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "4173:4173"
    command: npm run preview -- --host 0.0.0.0
    env_file:
      - ./frontend/.env
    depends_on:
      - backend